spring.application.name=HealthCare

# ─── Datasource ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/HealthCare_4?createDatabaseIfNotExist=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ─── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=aGVhbHRoY2FyZV9zdXBlcl9zZWN1cmVfc2VjcmV0X2tleV8yMDI2X2FwcA==

# ─── SpringDoc / Swagger UI ───────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
