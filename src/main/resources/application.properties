spring.application.name=HealthCare

# 0. Server Configuration
server.port=${PORT:8080}

# 1. Database Configuration
# Supports Railway defaults (MYSQLHOST, etc.) and custom env vars
spring.datasource.url=jdbc:mysql://${MYSQLHOST:${SPRING_DATASOURCE_HOST:localhost}}:${MYSQLPORT:${SPRING_DATASOURCE_PORT:3306}}/${MYSQLDATABASE:${SPRING_DATASOURCE_DB:healthcare_db}}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:${SPRING_DATASOURCE_USERNAME:healthcare_user}}
spring.datasource.password=${MYSQLPASSWORD:${SPRING_DATASOURCE_PASSWORD:mysecretpassword}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Redis Configuration
# Supports Railway defaults (REDISHOST, etc.)
spring.data.redis.host=${REDISHOST:localhost}
spring.data.redis.port=${REDISPORT:6379}
spring.data.redis.password=${REDISPASSWORD:}

# 3. Hibernate & Flyway Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db.migration
spring.flyway.baseline-on-migrate=true

# 4. Security
jwt.secret=${JWT_SECRET:my_super_secure_secret_key_for_jwt_2026_healthcare_app}
